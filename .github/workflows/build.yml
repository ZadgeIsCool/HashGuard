name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        configuration: [Debug, Release]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore src/HashGuard.sln

    - name: Build
      run: dotnet build src/HashGuard.sln --configuration ${{ matrix.configuration }} --no-restore

    - name: Run tests
      run: dotnet test src/HashGuard.sln --configuration ${{ matrix.configuration }} --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.configuration }}
        path: '**/test-results.trx'

  publish:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'release'

    strategy:
      matrix:
        runtime: [win-x64, win-x86]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish ${{ matrix.runtime }}
      run: >
        dotnet publish src/HashGuard/HashGuard.csproj
        --configuration Release
        --runtime ${{ matrix.runtime }}
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        --output ./publish/${{ matrix.runtime }}

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: HashGuard-${{ matrix.runtime }}
        path: ./publish/${{ matrix.runtime }}/
